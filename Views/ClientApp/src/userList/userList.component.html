<section class="users-list">
    <p>Количество пользователей: {{ users?.length || 0 }}</p>

    <div *ngFor="let user of users;" class="user-item">
    [{{ user.id }}] {{ user.name }} — {{ user.email }}
    (возраст: {{ user.age }}, активен: {{ user.isActive ? 'Да' : 'Нет' }})
    </div>

</section>
